<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Title Here</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <!-- Main feed page -->
    <div class="main-page-container" id="mainPageContainer">

        <!-- Post feed -->
        <div class="post-feed" id="postFeed">
            <!-- Posts will be loaded here dynamically -->
        </div>

        <!-- Post form overlay (hidden by default, opens on right-click) -->
        <div class="post-form-overlay" id="postFormOverlay" style="display: none;">
            <div class="post-form" id="postForm">

                <!-- Title input -->
                <input type="text" class="post-form-title" id="postTitle" placeholder="title" maxlength="75" autocomplete="off">

                <!-- Category dropdown (wired up later) -->
                <select class="post-form-category" id="postCategory" disabled>
                    <option value="">category (coming soon)</option>
                </select>

                <!-- File upload -->
                <label class="post-form-file-label" id="postFileLabel">
                    <span id="postFileName">choose file</span>
                    <input type="file" id="postFileInput" accept="image/*">
                </label>

                <!-- Text input (wired up later) -->
                <textarea class="post-form-text" id="postText" placeholder="text (coming soon)" disabled></textarea>

                <!-- Buttons -->
                <div class="post-form-buttons">
                    <button id="postSubmitBtn">submit</button>
                    <button id="postCancelBtn">cancel</button>
                </div>

            </div>
        </div>

    </div>

    <script type="module" src="./main.js"></script>
</body>
</html>
